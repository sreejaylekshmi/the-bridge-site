.eyebrow::before { content:"── "; color:var(--signal); }

             padding:22px 26px; text-decoration:none; margin-top:16px; }
.post-link:hover { border-color:var(--cobalt); }
.post-link .date { font-family:var(--mono); font-size:12.5px; color:var(--body); }
.post-link .t { font-family:var(--display); color:var(--ink); font-size:19px; display:block; margin-top:4px; }
.post-link .d { font-size:15px; color:var(--body); display:block; margin-top:6px; }
